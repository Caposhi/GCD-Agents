# GCD-SOCIAL — Render Blueprint
# Web service (trigger/webhook receiver) + background worker (long-running orchestration) + Postgres.
# Runtime shown as Node; swap `runtime: node` → `python` and the commands if you build the harness in Python.
# NOTE: set all real secrets in the Render dashboard or as a secret group, NOT here. This file is committed.

databases:
  - name: gcd-social-db
    databaseName: gcd_social
    plan: basic-256mb        # smallest current (non-legacy) Postgres plan (~$6/mo). Use `free` for zero-cost testing (expires after 30 days).
    # stores: agent state, approval queue, brand scorecard, self-improvement proposal lineage

services:
  # 1) Trigger receiver — accepts scheduled triggers / manual kickoffs / approval callbacks.
  - type: web
    name: gcd-social-api
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:api
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gcd-social-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false          # set in dashboard
      # Native publishing credentials (no aggregator). All set in dashboard.
      - key: IG_USER_ID                 # Instagram user id (graph.instagram.com)
        sync: false
      - key: IG_ACCESS_TOKEN            # Instagram user token (Instagram-Login path)
        sync: false
      - key: IG_APP_ID                  # Instagram app id (token refresh / appsecret_proof) — not secret
        sync: false
      - key: IG_APP_SECRET              # Instagram app secret (SECRET — token exchange/refresh)
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN       # Facebook Page token (graph.facebook.com)
        sync: false
      - key: FB_APP_ID                  # GCD-Agent app id (FB token refresh) — not secret
        sync: false
      - key: FB_APP_SECRET              # GCD-Agent app secret (SECRET)
        sync: false
      - key: GOOGLE_ACCESS_TOKEN        # GBP OAuth (refreshed via GOOGLE_REFRESH_TOKEN)
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID           # OAuth client id (for token refresh)
        sync: false
      - key: GOOGLE_CLIENT_SECRET       # OAuth client secret (SECRET)
        sync: false
      - key: GBP_ACCOUNT_ID
        sync: false
      - key: GBP_LOCATION_ID
        sync: false
      - key: APPROVAL_CHANNEL_WEBHOOK   # Slack incoming webhook (locked decision: Slack primary, email fallback)
        sync: false
      - key: AUTONOMY_PHASE
        value: A             # A = approval gate (all posts). B = shadow/canary. C = full autonomy.
      - key: PUBLIC_BASE_URL            # web service URL, for Slack approval links
        value: https://gcd-social-api.onrender.com

  # 2) Orchestration worker — runs the manager + subagents. Long-running; persistent, not serverless.
  - type: worker
    name: gcd-social-worker
    runtime: node
    plan: starter            # the agent loop can run for many minutes; this is why Render, not Vercel
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gcd-social-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: IMAGEGEN_API_KEY
        sync: false
      # Native publishing credentials (no aggregator).
      - key: IG_USER_ID
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_APP_ID
        sync: false
      - key: IG_APP_SECRET
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: GOOGLE_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GBP_ACCOUNT_ID
        sync: false
      - key: GBP_LOCATION_ID
        sync: false
      - key: APPROVAL_CHANNEL_WEBHOOK
        sync: false
      - key: AUTONOMY_PHASE
        value: A
      - key: PUBLIC_BASE_URL
        value: https://gcd-social-api.onrender.com

# Posting cadence: 1 post/platform/day. Drive scheduled briefs via a Render Cron Job
# that POSTs to gcd-social-api, or via the SDK's scheduled-tasks pattern.
